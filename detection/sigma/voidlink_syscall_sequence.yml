title: VoidLink Fileless Execution Syscall Sequence
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: |
  Detects VoidLink's characteristic syscall sequence for fileless execution:
  fork(57) → prctl(157) → socket(41) → connect(42) → recvfrom(45) →
  memfd_create(319) → write(1) → execveat(322).
  This sequence creates a child process, masquerades it, connects to C2,
  downloads a payload, writes it to an anonymous memory-backed file descriptor,
  and executes it without touching disk.
references:
  - https://www.sysdig.com/blog/voidlink-threat-analysis-sysdig-discovers-c2-compiled-kernel-rootkits
  - https://research.checkpoint.com/2026/voidlink-the-cloud-native-malware-framework/
author: de-voidlink detection suite
date: 2026/02/19
tags:
  - attack.execution
  - attack.t1059.004
  - attack.t1106
  - attack.defense_evasion
  - attack.t1027.011
  - voidlink
logsource:
  category: process_creation
  product: linux
detection:
  # Phase 1: Fork + process masquerade
  fork_masquerade:
    EventType: 'syscall'
    SyscallName|contains:
      - 'clone'
      - 'fork'
    CommandLine|contains:
      - '[kworker/'
      - 'migration/'
      - 'watchdog/'
      - 'rcu_sched'
  # Phase 2: Socket creation + C2 connection
  socket_connect:
    EventType: 'syscall'
    SyscallName:
      - 'socket'
      - 'connect'
  # Phase 3: Fileless execution via memfd_create
  fileless_exec:
    EventType: 'syscall'
    SyscallName:
      - 'memfd_create'
    # execveat with AT_EMPTY_PATH (0x1000)
  execveat_empty:
    EventType: 'syscall'
    SyscallName:
      - 'execveat'
  condition: fork_masquerade and socket_connect and (fileless_exec or execveat_empty)
  timeframe: 30s
falsepositives:
  - Legitimate use of memfd_create for shared memory (rare in combination with execveat)
  - Container runtimes that use memfd for binary loading
level: critical
