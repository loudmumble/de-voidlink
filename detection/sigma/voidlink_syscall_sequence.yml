title: VoidLink memfd_create Fileless Execution
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: |
  Detects the specific pattern of memfd_create("", MFD_CLOEXEC) followed by
  execveat(fd, "", argv, envp, AT_EMPTY_PATH). This is the core fileless
  execution technique used by VoidLink. The empty name argument to memfd_create
  and AT_EMPTY_PATH flag to execveat are strong indicators.
  Equivalent to Sysdig Falco rule from the TRT report.
references:
  - https://www.sysdig.com/blog/voidlink-threat-analysis-sysdig-discovers-c2-compiled-kernel-rootkits
author: de-voidlink detection suite (adapted from Sysdig Falco rule)
date: 2026/02/19
tags:
  - attack.defense_evasion
  - attack.t1027.011
  - voidlink
logsource:
  category: process_creation
  product: linux
detection:
  memfd_exec:
    ParentImage|contains: 'memfd:'
    Image|contains: 'memfd:'
  fd_path:
    CommandLine|contains:
      - '/proc/self/fd/'
      - 'memfd:'
  condition: memfd_exec or fd_path
falsepositives:
  - JIT compilers using memfd for code generation
  - Some container runtimes
level: critical
