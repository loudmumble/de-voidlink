title: VoidLink Security Product Enumeration
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: |
  Detects enumeration of security product processes, which VoidLink performs to
  assess risk and adapt its evasion strategy. VoidLink scans /proc/*/comm for:
  falcon-sensor, SentinelAgent, cbagentd, falco, sysdig, wazuh-agent, ossec,
  osqueryd, auditd, clamd, AliYunDun, frida-server.
  Also detects reading TracerPid from /proc/self/status (anti-debugging).
references:
  - https://www.sysdig.com/blog/voidlink-threat-analysis-sysdig-discovers-c2-compiled-kernel-rootkits
author: de-voidlink detection suite
date: 2026/02/19
tags:
  - attack.discovery
  - attack.t1518.001
  - attack.t1057
  - voidlink
logsource:
  category: file_access
  product: linux
detection:
  proc_comm_scan:
    TargetFilename|contains:
      - '/proc/'
    TargetFilename|endswith:
      - '/comm'
      - '/cmdline'
    # Multiple rapid accesses to different /proc/*/comm files
  anti_debug:
    TargetFilename:
      - '/proc/self/status'
    # Reading TracerPid field
  security_tool_names:
    TargetFilename|contains:
      - 'falcon-sensor'
      - 'SentinelAgent'
      - 'cbagentd'
      - 'falco'
      - 'wazuh'
      - 'ossec'
      - 'osqueryd'
      - 'AliYunDun'
      - 'frida-server'
  condition: (proc_comm_scan and security_tool_names) or anti_debug
  timeframe: 5s
falsepositives:
  - Monitoring tools that enumerate running processes
  - Container health checks scanning /proc
level: medium
