title: VoidLink LKM Rootkit Loading
id: f6a7b8c9-d0e1-2345-fabc-456789012345
status: experimental
description: |
  Detects loading of a Linux kernel module with VoidLink rootkit characteristics:
  - Module loaded from tmpfs/shmem paths (/tmp/, /dev/shm/, /var/tmp/)
  - Module uses prctl magic 0x564C ("VL")
  - init_module/finit_module syscall from non-standard locations
  - Module immediately hides itself (list_del_init + kobject_del)
references:
  - https://www.sysdig.com/blog/voidlink-threat-analysis-sysdig-discovers-c2-compiled-kernel-rootkits
author: de-voidlink detection suite
date: 2026/02/19
tags:
  - attack.persistence
  - attack.t1547.006
  - attack.defense_evasion
  - attack.t1014
  - voidlink
logsource:
  category: driver_load
  product: linux
detection:
  module_load:
    EventType: 'syscall'
    SyscallName:
      - 'init_module'
      - 'finit_module'
  suspicious_path:
    ImageLoaded|contains:
      - '/tmp/'
      - '/dev/shm/'
      - '/var/tmp/'
      - '.font-unix'
  ko_artifact:
    ImageLoaded|endswith:
      - '.tmp.ko'
      - 'vl_stealth.ko'
  condition: module_load and (suspicious_path or ko_artifact)
falsepositives:
  - Legitimate kernel module installations from /tmp during system updates
  - DKMS builds that temporarily place modules in /tmp
level: critical
