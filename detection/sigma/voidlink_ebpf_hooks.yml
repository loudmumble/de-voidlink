title: VoidLink eBPF Rootkit Hook Attachment
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: experimental
description: |
  Detects suspicious eBPF program loading that matches VoidLink's rootkit behavior.
  VoidLink attaches BPF kprobes/kretprobes to syscalls used for process, file,
  and network hiding:
  - getdents64 (directory listing hiding)
  - tcp4_seq_show, tcp6_seq_show, udp4_seq_show (network connection hiding)
  - netlink_recvmsg (netlink socket hiding)
  - inet_sk_diag_fill (ss/netstat hiding)
  - vfs_read (file content hiding)
  Also detects VoidLink-specific BPF map names: sd_nl_ports, sd_cg_pids, sd_cg_names.
references:
  - https://www.sysdig.com/blog/voidlink-threat-analysis-sysdig-discovers-c2-compiled-kernel-rootkits
author: de-voidlink detection suite
date: 2026/02/19
tags:
  - attack.defense_evasion
  - attack.t1014
  - attack.persistence
  - voidlink
logsource:
  category: bpf
  product: linux
detection:
  bpf_prog_load:
    EventType: 'bpf'
    BPFCommand:
      - 'BPF_PROG_LOAD'
      - 'prog_load'
  sensitive_hooks:
    BPFAttachTarget|contains:
      - 'getdents64'
      - 'tcp4_seq_show'
      - 'tcp6_seq_show'
      - 'udp4_seq_show'
      - 'netlink_recvmsg'
      - 'inet_sk_diag_fill'
      - 'vfs_read'
      - '__x64_sys_kill'
  voidlink_maps:
    BPFMapName|contains:
      - 'sd_nl_ports'
      - 'sd_cg_pids'
      - 'sd_cg_names'
  rootkit_prog_types:
    BPFProgType|contains:
      - 'BPF_PROG_TYPE_KPROBE'
      - 'BPF_PROG_TYPE_TRACEPOINT'
      - 'kprobe'
      - 'kretprobe'
  condition: (bpf_prog_load and sensitive_hooks) or voidlink_maps or (rootkit_prog_types and sensitive_hooks)
falsepositives:
  - Legitimate eBPF-based monitoring tools (Cilium, Falco, bcc-tools)
  - Performance profiling tools using kprobes
level: critical
