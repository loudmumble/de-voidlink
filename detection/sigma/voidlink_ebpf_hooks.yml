title: VoidLink Network C2 Communication
id: a7b8c9d0-e1f2-3456-abcd-567890123456
status: experimental
description: |
  Detects network communication patterns matching VoidLink's C2 protocol:
  - HTTP requests to VoidLink-specific API endpoints
  - Connections from processes masquerading as kernel threads
  - Known VoidLink C2 IP addresses
  - Suspicious User-Agent rotation
references:
  - https://www.sysdig.com/blog/voidlink-threat-analysis-sysdig-discovers-c2-compiled-kernel-rootkits
author: de-voidlink detection suite
date: 2026/02/19
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1573.001
  - voidlink
logsource:
  category: network_connection
  product: linux
detection:
  c2_endpoints:
    HttpRequestUri|contains:
      - '/api/v2/handshake'
      - '/api/v2/sync'
      - '/api/v2/heartbeat'
      - '/compile'
      - '/stage1.bin'
      - '/implant.bin'
  c2_ip:
    DestinationIp:
      - '8.149.128.10'
  masquerade_network:
    Image|contains:
      - '[kworker/'
      - 'migration/0'
      - 'watchdog/0'
    EventType: 'connect'
  condition: c2_endpoints or c2_ip or masquerade_network
falsepositives:
  - API endpoints with similar naming conventions
  - Legitimate connections to Alibaba Cloud IPs
level: high
